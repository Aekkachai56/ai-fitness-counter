<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI Fitness Counter with Controls</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
    .container { position: relative; display: inline-block; background: #2d2d2d; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    canvas { border-radius: 15px; background: #000; max-width: 100%; height: auto; }
    
    .controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
    button { padding: 12px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
    
    #btnStart { background: #4CAF50; color: white; }
    #btnStart:hover { background: #45a049; }
    #btnStop { background: #f44336; color: white; }
    #btnStop:hover { background: #da190b; }
    #btnReset { background: #2196F3; color: white; }
    #btnReset:hover { background: #0b7dda; }
    button:disabled { background: #555 !important; cursor: not-allowed; }

    #stats {
      position: absolute; top: 30px; left: 30px; text-align: left;
      background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px; border: 1px solid #555;
    }
    .counter-text { font-size: 54px; color: #4CAF50; font-weight: bold; margin: 5px 0; }
    .status-badge { padding: 4px 10px; border-radius: 5px; font-size: 14px; background: #555; }
    video { display: none; }
  </style>
</head>

<body>
  <h1>AI Fitness Tracker</h1>
  
  <div class="container">
    <video id="input_video"></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
    
    <div id="stats">
      <div id="mode_status" class="status-badge">READY</div>
      <div style="margin-top:10px;">องศาแขน: <span id="angle_text">0</span>°</div>
      <div class="counter-text"><span id="counter">0</span> REPS</div>
      <div id="motion_state" style="color: #aaa;">-</div>
    </div>
  </div>

  <div class="controls">
    <button id="btnStart">เริ่มนับ (Start)</button>
    <button id="btnStop" disabled>หยุด (Stop)</button>
    <button id="btnReset">รีเซ็ต (Reset)</button>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    // ตัวแปรควบคุมสถานะ
    let count = 0;
    let stage = 'down';
    let isRunning = false;

    function calculateAngle(a, b, c) {
        let radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
        let angle = Math.abs(radians * 180.0 / Math.PI);
        if (angle > 180.0) angle = 360 - angle;
        return angle;
    }

    function onResults(results) {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.poseLandmarks) {
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FFFFFF', lineWidth: 1, radius: 3});

        // คำนวณเฉพาะเมื่อกด Start เท่านั้น
        if (isRunning) {
          const shoulder = results.poseLandmarks[11];
          const elbow = results.poseLandmarks[13];
          const wrist = results.poseLandmarks[15];

          const angle = calculateAngle(shoulder, elbow, wrist);
          document.getElementById('angle_text').innerText = Math.round(angle);

          // Logic การนับ
          if (angle > 160) {
              if (stage !== "down") {
                  document.getElementById('motion_state').innerText = "เตรียมพับแขน...";
              }
              stage = "down";
          }
          if (angle < 30 && stage === "down") {
              stage = "up";
              count++;
              document.getElementById('counter').innerText = count;
              document.getElementById('motion_state').innerText = "เยี่ยมมาก! +1";
              
              // เพิ่ม Effect เสียงสั้นๆ (ถ้ามี) หรือเปลี่ยนสีตัวเลขชั่วคราว
              document.getElementById('counter').style.color = "#white";
              setTimeout(() => document.getElementById('counter').style.color = "#4CAF50", 300);
          }
        }
      }
      canvasCtx.restore();
    }

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    pose.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await pose.send({image: videoElement}); },
      width: 640, height: 480
    });
    camera.start();

    // --- ส่วนควบคุมปุ่มกด ---

    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const btnReset = document.getElementById('btnReset');
    const modeStatus = document.getElementById('mode_status');

    btnStart.onclick = () => {
      isRunning = true;
      btnStart.disabled = true;
      btnStop.disabled = false;
      modeStatus.innerText = "TRACKING";
      modeStatus.style.background = "#4CAF50";
    };

    btnStop.onclick = () => {
      isRunning = false;
      btnStart.disabled = false;
      btnStop.disabled = true;
      modeStatus.innerText = "PAUSED";
      modeStatus.style.background = "#f44336";
    };

    btnReset.onclick = () => {
      count = 0;
      stage = 'down';
      document.getElementById('counter').innerText = "0";
      document.getElementById('motion_state').innerText = "รีเซ็ตแล้ว";
      if (!isRunning) {
          modeStatus.innerText = "READY";
          modeStatus.style.background = "#555";
      }
    };

  </script>
</body>
</html>
