<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>โปรเจกต์นับจำนวนครั้งการออกกำลังกาย 🏋️💪</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { font-family: 'Kanit', sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 20px; }
    .container { position: relative; display: inline-block; background: #1e1e1e; padding: 15px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
    canvas { border-radius: 15px; background: #000; width: 100%; max-width: 640px; height: auto; }
    
    .menu { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    select { padding: 10px; border-radius: 8px; font-size: 16px; background: #333; color: white; border: 1px solid #4CAF50; }
    
    .controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
    button { padding: 12px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    
    #btnStart { background: #4CAF50; color: white; }
    #btnStop { background: #f44336; color: white; }
    #btnReset { background: #555; color: white; }
    button:active { transform: scale(0.95); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #stats {
      position: absolute; top: 25px; left: 25px; text-align: left;
      background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; border-left: 5px solid #4CAF50;
    }
    .counter-text { font-size: 60px; color: #4CAF50; font-weight: bold; line-height: 1; }
    .mode-label { font-size: 14px; color: #aaa; text-transform: uppercase; }
    video { display: none; }
  </style>
</head>

<body>
  <h1>โปรเจกต์นับจำนวนครั้งการออกกำลังกาย 🏋️💪</h1>
  
  <div class="menu">
    <label for="exercise-select">เลือกท่าออกกำลังกาย: </label>
    <select id="exercise-select">
      <option value="bicep_curl">Bicep Curl (พับแขน)</option>
      <option value="squat">Squat (ลุกนั่ง)</option>
      <option value="pushup">Push-up (วิดพื้น)</option>
    </select>
  </div>

  <div class="container">
    <video id="input_video"></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
    
    <div id="stats">
      <div id="current-exercise" class="mode-label">BICEP CURL</div>
      <div class="counter-text"><span id="counter">0</span></div>
      <div id="status-text" style="font-size: 18px; color: #4CAF50;">READY</div>
    </div>
  </div>

  <div class="controls">
    <button id="btnStart">เริ่ม</button>
    <button id="btnStop" disabled>หยุด</button>
    <button id="btnReset">รีเซ็ต</button>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const exerciseSelect = document.getElementById('exercise-select');
    
    let count = 0;
    let stage = 'down';
    let isRunning = false;

    function calculateAngle(a, b, c) {
        let radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
        let angle = Math.abs(radians * 180.0 / Math.PI);
        if (angle > 180.0) angle = 360 - angle;
        return angle;
    }

    function onResults(results) {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.poseLandmarks && isRunning) {
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FFFFFF', lineWidth: 1, radius: 2});

        let angle = 0;
        const ex = exerciseSelect.value;

        if (ex === "bicep_curl") {
            angle = calculateAngle(results.poseLandmarks[11], results.poseLandmarks[13], results.poseLandmarks[15]);
            if (angle > 160) stage = "down";
            if (angle < 30 && stage === "down") { stage = "up"; count++; }
        } else if (ex === "squat") {
            angle = calculateAngle(results.poseLandmarks[23], results.poseLandmarks[25], results.poseLandmarks[27]);
            if (angle > 160) stage = "up";
            if (angle < 90 && stage === "up") { stage = "down"; count++; }
        } else if (ex === "pushup") {
            angle = calculateAngle(results.poseLandmarks[11], results.poseLandmarks[13], results.poseLandmarks[15]);
            if (angle > 160) stage = "up";
            if (angle < 80 && stage === "up") { stage = "down"; count++; }
        }

        document.getElementById('counter').innerText = count;
        document.getElementById('status-text').innerText = stage.toUpperCase();
      }
      canvasCtx.restore();
    }

    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await pose.send({image: videoElement}); },
      width: 640, height: 480
    });
    camera.start();

    // Controls
    document.getElementById('btnStart').onclick = () => {
        isRunning = true;
        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnStop').disabled = false;
        document.getElementById('status-text').innerText = "GO!";
    };

    document.getElementById('btnStop').onclick = () => {
        isRunning = false;
        document.getElementById('btnStart').disabled = false;
        document.getElementById('btnStop').disabled = true;
        document.getElementById('status-text').innerText = "PAUSED";
    };

    document.getElementById('btnReset').onclick = () => {
        count = 0;
        document.getElementById('counter').innerText = "0";
    };

    exerciseSelect.onchange = () => {
        document.getElementById('current-exercise').innerText = exerciseSelect.options[exerciseSelect.selectedIndex].text;
        count = 0;
        document.getElementById('counter').innerText = "0";
    };
  </script>
</body>
</html>
